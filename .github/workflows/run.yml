name: Binance Bot

on:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          MISTRAL_API: ${{ secrets.MISTRAL_API }}
          SQUARE_API: ${{ secrets.SQUARE_API }}
